name: Build Nxtrive

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target_triple: aarch64-apple-darwin
            bundle_dir: src-tauri/target/aarch64-apple-darwin/release/bundle/
            artifact_label: macos-arm64
            python: "3.11"
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target_triple: x86_64-apple-darwin
            bundle_dir: src-tauri/target/x86_64-apple-darwin/release/bundle/
            artifact_label: macos-x64
            python: "3.11"
          - platform: ubuntu-22.04
            args: ""
            target_triple: x86_64-unknown-linux-gnu
            bundle_dir: src-tauri/target/release/bundle/
            artifact_label: linux-x64
            python: "3.11"
          - platform: windows-latest
            args: ""
            target_triple: x86_64-pc-windows-msvc
            bundle_dir: src-tauri/target/release/bundle/
            artifact_label: windows-x64
            python: "3.11"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build Python backend (Unix)
        if: matrix.platform != 'windows-latest'
        env:
          BACKEND_TARGET_TRIPLE: ${{ matrix.target_triple }}
        run: bash scripts/build-backend.sh

      - name: Build Python backend (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: .\scripts\build-backend.ps1

      - name: Install frontend deps
        run: npm ci --ignore-scripts

      - name: Import Windows code signing certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) { exit 0 }
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $bytes)

      - name: Import macOS code signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then exit 0; fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import $RUNNER_TEMP/certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Nxtrive ${{ github.ref_name }}
          releaseBody: |
            ## Nxtrive ${{ github.ref_name }}

            100% offline AI document chat for Windows, macOS, and Linux.

            | Platform | Installers |
            |----------|------------|
            | Windows | `.msi`, `.exe` (NSIS) |
            | macOS | `.dmg` (Apple Silicon + Intel builds) |
            | Linux | `.deb`, `.rpm`, `.AppImage` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: nxtrive-${{ matrix.artifact_label }}
          path: ${{ matrix.bundle_dir }}
          if-no-files-found: error
          retention-days: 30
