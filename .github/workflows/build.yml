name: Build Nxtrive

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
            target_triple: aarch64-apple-darwin
            bundle_dir: src-tauri/target/release/bundle/
            artifact_label: macos-arm64
            python: "3.11"
          - platform: macos-13
            args: ""
            target_triple: x86_64-apple-darwin
            bundle_dir: src-tauri/target/release/bundle/
            artifact_label: macos-x64
            python: "3.11"
          - platform: ubuntu-22.04
            args: ""
            target_triple: x86_64-unknown-linux-gnu
            bundle_dir: src-tauri/target/release/bundle/
            artifact_label: linux-x64
            python: "3.11"
          - platform: windows-latest
            args: ""
            target_triple: x86_64-pc-windows-msvc
            bundle_dir: src-tauri/target/release/bundle/
            artifact_label: windows-x64
            python: "3.11"

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    env:
      # GitHub runners have no FUSE — required for linuxdeploy AppImages
      APPIMAGE_EXTRACT_AND_RUN: "1"
      # Avoid linuxdeploy strip failures on modern ELF (.relr.dyn) in CI
      NO_STRIP: "true"
      # Skip unsigned macOS codesign in CI (set secrets + signingIdentity to sign)
      APPLE_SIGNING_IDENTITY: "-"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 \
            file libglib2.0-dev

      - name: Build Python backend (Unix)
        if: matrix.platform != 'windows-latest'
        env:
          BACKEND_TARGET_TRIPLE: ${{ matrix.target_triple }}
        run: bash scripts/build-backend.sh

      - name: Build Python backend (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: .\scripts\build-backend.ps1

      - name: Install frontend deps
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Nxtrive ${{ github.ref_name }}
          releaseBody: |
            ## Nxtrive ${{ github.ref_name }}

            100% offline AI document chat for Windows, macOS, and Linux.

            | Platform | Installers |
            |----------|------------|
            | Windows | `.msi`, `.exe` (NSIS) |
            | macOS | `.dmg` (Apple Silicon + Intel builds) |
            | Linux | `.deb`, `.rpm`, `.AppImage` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: nxtrive-${{ matrix.artifact_label }}
          path: ${{ matrix.bundle_dir }}
          if-no-files-found: error
          retention-days: 30
